name: Node.js Ci

on:   
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]                              

jobs:
  build:  
    runs-on: ubuntu-latest            
    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}              
      - run: npm install
      - run: node test.js